<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baymax Login</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle at top, #e0f2fe, #ffffff 60%);
    }
    .login-container {
        background: white;
        padding: 40px 30px;
        border-radius: 32px;
        box-shadow: 0 30px 60px rgba(56, 189, 248, 0.25);
        text-align: center;
        width: 320px;
        transition: opacity 0.8s ease; 
    }
    .login-container h2 {
        color: #b91c1c;
        margin-bottom: 10px;
        font-size: 24px;
    }
    .login-container p {
        color: #334155;
        font-size: 14px;
        margin-bottom: 20px;
    }
    .login-container input {
        width: 100%;
        padding: 12px 16px;
        margin: 8px 0;
        border: 2px solid #bae6fd;
        border-radius: 999px;
        outline: none;
        font-size: 15px;
        transition: all 0.3s ease;
    }
    .login-container input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
    }
    .login-container .login-btn {
        width: 100%;
        padding: 12px 20px;
        background: #dc2626;
        color: white;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 999px;
        cursor: pointer;
        margin-top: 10px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(220,38,38,0.3);
    }
    .login-container .login-btn:hover {
        background: #b91c1c;
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(220,38,38,0.4);
    }
    .message {
        color: #b91c1c;
        margin-top: 10px;
        font-size: 14px;
    }
    .baymax-gif {
        width: 120px;
        height: auto;
        margin: 0 auto 20px auto;
        display: block;
    }
</style>
</head>
<body>

<div class="login-container" id="loginContainer">
    <img src="https://media.tenor.com/c4cx59tZFTkAAAAM/baymax-hello.gif" 
         alt="Baymax waving" class="baymax-gif" id="baymaxGif" />
    <h2>Welcome to Baymax</h2>
    <p>Enter your credentials to start chatting!</p>

    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <button class="login-btn" onclick="login()">Login</button>

    <div class="message" id="message"></div>
</div>

<script>
const loginContainer = document.getElementById("loginContainer");
const baymaxGif = document.getElementById("baymaxGif");
const messageEl = document.getElementById("message");


setTimeout(() => { baymaxGif.style.display = "none"; }, 200000);


document.getElementById("username").addEventListener("keypress", e => { if(e.key === "Enter") login(); });
document.getElementById("password").addEventListener("keypress", e => { if(e.key === "Enter") login(); });

function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(username === "jasim" && password === "baymax") {
        messageEl.style.color = "green";
        messageEl.textContent = "Login successful! Redirecting...";
       
        loginContainer.style.opacity = 0;
        setTimeout(() => { window.location.href = "chatbot.html"; }, 1200);
    } else {
        messageEl.style.color = "#b91c1c";
        messageEl.textContent = "Incorrect username or password!";
        
        loginContainer.style.transform = "translateX(-5px)";
        setTimeout(() => { loginContainer.style.transform = "translateX(0)"; }, 100);
    }
}
</script>

</body>
</html>
